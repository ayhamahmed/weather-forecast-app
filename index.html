<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Forecast</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header>
      <h1>Weather Forecast</h1>
      <p class="subtitle">Enter a city name to get current weather</p>
    </header>

    <form id="searchForm" class="search-form">
      <input
        type="text"
        id="cityInput"
        placeholder="Enter city name (e.g. London, Paris)"
        autocomplete="off"
      >
      <button type="submit" id="searchBtn">Search</button>
    </form>

    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <p>Fetching weather data...</p>
    </div>

    <div id="error" class="error hidden"></div>

    <div id="weatherCard" class="weather-card hidden">
      <div class="weather-header">
        <h2 id="cityName"></h2>
        <p id="weatherCondition" class="weather-condition"></p>
        <div class="weather-icon">
          <img id="weatherIcon" src="" alt="">
        </div>
      </div>

      <div class="weather-main">
        <div class="temperature">
          <span id="temperature"></span>
          <span class="unit">°C</span>
        </div>
        <p id="feelsLike" class="feels-like"></p>
      </div>

      <div class="weather-details">
        <div class="detail-item">
          <span class="detail-label">Humidity</span>
          <span id="humidity" class="detail-value"></span>
        </div>
        <div class="detail-item">
          <span class="detail-label">Wind Speed</span>
          <span id="windSpeed" class="detail-value"></span>
        </div>
      </div>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
